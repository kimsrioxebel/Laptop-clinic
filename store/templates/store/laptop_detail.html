<!DOCTYPE html>
<html>
<head>
    <title>{{ laptop.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="row">

        <div class="col-md-6">
            {% if laptop.image %}
            <img src="{{ laptop.image.url }}" class="img-fluid">
            {% endif %}
        </div>

        <div class="col-md-6">
            <h2>{{ laptop.name }}</h2>
            <p>{{ laptop.processor }}</p>
            <p>{{ laptop.ram }} GB RAM</p>
            <p>{{ laptop.storage }}</p>
            <h4 class="text-success">KSh {{ laptop.price }}</h4>

            <a href="/" class="btn btn-dark mt-3">← Back to shop</a>
        </div>

    </div>
</div>

</body>
</html>
